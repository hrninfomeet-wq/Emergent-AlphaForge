services:
  mongo:
    image: mongo:7
    container_name: alphaforge_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ping:1}).ok"]
      interval: 15s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: alphaforge_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGO_URL: mongodb://mongo:27017
      DB_NAME: alphaforge
      CORS_ORIGINS: "http://localhost:3000"
      # Flattrade MCP session auto-sync target (host ~/.flattrade bind below).
      # Machine-specific by design — this compose file is single-machine.
      FLATTRADE_MCP_SESSION_DIR: /host-flattrade
    ports:
      - "8001:8001"
    volumes:
      - ./backend/app/strategies/plugins:/app/app/strategies/plugins
      - C:/Users/haroo/.flattrade:/host-flattrade

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_BACKEND_URL: http://localhost:8001
    container_name: alphaforge_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_BACKEND_URL: http://localhost:8001

volumes:
  mongo_data:
    driver: local
